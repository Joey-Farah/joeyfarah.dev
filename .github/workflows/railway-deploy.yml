name: Deploy to Railway

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Railway redeploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          RESPONSE=$(curl -sf -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"query":"{ me { projects { edges { node { environments { edges { node { id } } } services { edges { node { id } } } } } } } }"}')

          SERVICE_ID=$(echo "$RESPONSE" | python3 -c '
import json,sys
d=json.load(sys.stdin)
if not d.get("data") or not d["data"].get("me"):
    print("ERROR: Railway API auth failed. Response:", d, file=sys.stderr); sys.exit(1)
print(d["data"]["me"]["projects"]["edges"][0]["node"]["services"]["edges"][0]["node"]["id"])
')
          ENV_ID=$(echo "$RESPONSE" | python3 -c '
import json,sys
d=json.load(sys.stdin)
if not d.get("data") or not d["data"].get("me"):
    print("ERROR: Railway API auth failed. Response:", d, file=sys.stderr); sys.exit(1)
print(d["data"]["me"]["projects"]["edges"][0]["node"]["environments"]["edges"][0]["node"]["id"])
')

          curl -sf -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"mutation { serviceInstanceRedeploy(serviceId: \\\"$SERVICE_ID\\\", environmentId: \\\"$ENV_ID\\\") }\"}"

          echo "Deploy triggered for service $SERVICE_ID in environment $ENV_ID"
